services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: tick-liq-db
    environment:
      POSTGRES_USER: tick
      POSTGRES_PASSWORD: tick
      POSTGRES_DB: tick_liq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tick -d tick_liq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
