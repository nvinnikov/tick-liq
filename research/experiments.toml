# Research sweep config — backtest a matrix of (pool × range-width × rebalance)
# over real GeckoTerminal history. Run: `cargo run -- research`.
#
# Pool params (fee_bps, tick_spacing, pool_liquidity) are a snapshot read from
# each Orca Whirlpool account on-chain on 2026-06-19. pool_liquidity is the live
# L at snapshot time — fees scale with it, so it is the one approximated input
# (constant over the window). Only USDC-quoted pools are used so token-B fees map
# directly to USD. Pools span the volatility spectrum (JLP low → Fartcoin high).

[settings]
from = "2026-01-01"
to = "2026-06-01"
timeframe = "day"
capital_usd = 10000.0
range_widths = [0.05, 0.10, 0.20, 0.50]
rebalance = [false, true]

[[pools]]
label = "JLP/USDC"
address = "6NUiVmsNjsi4AfsMsEiaezsaV9N4N1ZrD4jEnuWNRvyb"
fee_bps = 2.0
decimals_a = 6
decimals_b = 6
tick_spacing = 2
