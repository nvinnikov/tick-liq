name: CI

on:
  pull_request:
    branches:
      - master
      - worktree-team-build
  push:
    branches:
      - master
      - worktree-team-build

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Build, Test, Clippy, Fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          # Share the cache across all jobs in this workflow rather than
          # cutting a new cache per run — registry/target are largely the
          # same between PRs and a shared key gives much higher hit rates.
          shared-key: "ci-stable"
          # Persist the cache even when a build/test/clippy step fails so
          # the *next* run starts warm. Without this, every red CI run
          # throws away its compilation cache.
          cache-on-failure: "true"
          # Restrict the target cache to crates we actually depend on
          # rather than the entire registry — keeps the cache slim.
          cache-targets: "true"
          # Include the workflow file hash in the cache key so changes
          # to ci.yml (e.g. new flags) automatically bust the cache.
          key: ${{ hashFiles('.github/workflows/ci.yml') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Check Cargo.lock is up to date
        run: |
          if ! cargo metadata --locked --format-version 1 >/dev/null 2>&1; then
            echo "::error::Cargo.lock is stale (out of sync with Cargo.toml)."
            echo ""
            echo "Someone changed Cargo.toml without committing the updated Cargo.lock."
            echo "This breaks every --locked build in CI."
            echo ""
            echo "To fix locally:"
            echo "  cargo generate-lockfile   # or just 'cargo build'"
            echo "  git add Cargo.lock"
            echo "  git commit --amend --no-edit   # or a new commit"
            echo "  git push --force-with-lease"
            exit 1
          fi
          echo "Cargo.lock is in sync with Cargo.toml."

      - name: cargo build
        run: cargo build --all-targets --locked

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings
