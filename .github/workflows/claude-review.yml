name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Review PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request following the "Code Review Guidelines"
            section in CLAUDE.md at the repository root.

            Use `gh pr diff` to read the changes. Do NOT build, compile, or run
            tests — no cargo, no clippy. Review statically from the diff.

            Focus only on bugs, security issues, and performance problems. Skip
            style and formatting nitpicks. Be concise and actionable.

            Post findings as inline comments on the specific lines using
            `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
            Use `gh pr comment` for a short top-level summary. If you find nothing
            worth raising, post a single brief summary saying so — do not invent
            concerns.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
