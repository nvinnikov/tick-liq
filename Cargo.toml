[package]
name = "tick-liq"
version = "0.1.0"
edition = "2021"

[lib]
name = "tick_liq"
path = "src/lib.rs"

[[bin]]
name = "lp-inspect"
path = "src/main.rs"

[dependencies]
# Solana
solana-client = "1.18"
solana-sdk = "1.18"

# Orca math
orca_whirlpools_core = "2"

# Serialization
borsh = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.21"
futures-util = "0.3"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Time (for watch command)
chrono = "0.4"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Storage
sqlx-core = { version = "0.8", default-features = false, features = ["_tls-native-tls"] }
sqlx-postgres = { version = "0.8", default-features = false, features = ["chrono"] }

# Orca Whirlpool CPI — Anchor 0.29 branch (locked per CONTEXT.md D-01)
# NOTE: uses git because the published crate has a solana-program ^3 conflict
whirlpool-cpi = { git = "https://github.com/orca-so/whirlpool-cpi", branch = "anchor/0.29.0", features = ["cpi"] }
anchor-lang  = "=0.29.0"
anchor-spl   = "=0.29.0"

# SPL ATA derivation (pulled transitively by anchor-spl but make explicit)
spl-associated-token-account = "1.1"

[dev-dependencies]
proptest = "1"