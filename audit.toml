# cargo audit configuration
# All ignored advisories below are transitive deps of solana-client = "1.18".
# They cannot be fixed without upgrading to Solana 2.x (tracked: TODO).

[advisories]

# curve25519-dalek 3.2.1 — timing variability in Scalar::sub
# Source: solana-sdk -> solana-zk-token-sdk
# Fix: upgrade curve25519-dalek to >=4.1.3 (requires Solana 2.x)
ignore = [
    "RUSTSEC-2024-0344",

    # ed25519-dalek 1.0.1 — double public key signing oracle attack
    # Source: solana-sdk
    # Fix: upgrade ed25519-dalek to >=2 (requires Solana 2.x)
    "RUSTSEC-2022-0093",

    # quinn-proto 0.10.6 — DoS in QUIC endpoints (CVSS 8.7)
    # Source: solana-streamer -> solana-quic-client
    # Fix: upgrade quinn-proto to >=0.11.14 (requires Solana 2.x)
    "RUSTSEC-2026-0037",

    # ring 0.16.20 — AES functions may panic with overflow checking enabled
    # Source: quinn-proto -> rcgen
    # Fix: upgrade ring to >=0.17.12 (requires Solana 2.x)
    "RUSTSEC-2025-0009",
]
